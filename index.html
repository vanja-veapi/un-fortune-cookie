<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>(Un)Fortune Cookie</title>

		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<h1>(Un)Fortune Cookie</h1>

		<div class="flex-center flex-column gap-1 mt-3">
			<div class="actions">
				<div class="choice">
					<label for="get-fortune">Fortune</label>
					<input type="radio" id="get-fortune" name="fortune-cookie" value="fortune" checked />
				</div>
				<div class="choice">
					<label for="get-misfortune">Misfortune</label>
					<input type="radio" id="get-misfortune" name="fortune-cookie" value="misfortune" />
				</div>
			</div>
			<input type="text" id="signature" placeholder="Signature (optional)" />
			<button type="button" id="create-cookie-btn">Create (un)fortune cookie</button>

			<span class="d-none"></span>
		</div>

		<!-- defer is equivalent to DOMContentLoaded:
     it waits for the HTML document to be parsed,
     but does not wait for images or other resources -->
		<script type="module" src="js/main.js" defer></script>
	</body>
</html>
