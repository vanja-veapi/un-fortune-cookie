<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="style.css" />
		<title>Stranica za otvaranje kolacica srece</title>
	</head>
	<body>
		<h1>Stranica za otvaranje kolacica srece</h1>

		<div class="relative flex-center container">
			<div class="left-control flex-center controls-container">
				<kbd class="flex-center prevent-select d-sm-none">A</kbd>
				<div class="left circle pulse green phone-only"></div>
			</div>

			<img
				src="../../img/whole-cookie-split-left.png"
				alt="Kolacic srece"
				class="absolute transition cookie-piece prevent-select responsive-img"
			/>
			<img
				src="../../img/whole-cookie-split-right.png"
				alt="Kolacic srece"
				class="absolute transition cookie-piece prevent-select responsive-img"
			/>

			<div class="right-control flex-center controls-container">
				<div class="right circle pulse green phone-only"></div>
				<kbd class="flex-center prevent-select d-sm-none">D</kbd>
			</div>
		</div>
		<!-- type="module" već implicitno deferuje script. -->
		<script type="module" src="js/main.js"></script>
	</body>
</html>
