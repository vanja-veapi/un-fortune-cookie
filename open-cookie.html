<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="style.css" />
		<title>Stranica za otvaranje kolacica srece</title>
	</head>
	<body>
		<h1>Stranica za otvaranje kolacica srece</h1>

		<div class="flex-center container">
			<img
				src="../../img/whole-cookie-split-left.png"
				alt="Kolacic srece"
				width="480"
				class="absolute transition broken-cookie cookie-fortune prevent-select d-none"
			/>
			<img
				src="../../img/whole-cookie-split-right.png"
				alt="Kolacic srece"
				width="480"
				class="absolute transition broken-cookie cookie-fortune prevent-select d-none"
			/>

			<div class="flex-center whole-cookie">
				<kbd class="flex-center prevent-select d-sm-none">A</kbd>
				<div class="left circle pulse green d-md-none"></div>

				<img src="img/whole-cookie.png" alt="Kolacic srece" />

				<div class="right circle pulse green d-md-none"></div>
				<kbd class="flex-center prevent-select d-sm-none">D</kbd>
			</div>
		</div>
		<script type="module" src="js/main.js" defer></script>
	</body>
</html>
